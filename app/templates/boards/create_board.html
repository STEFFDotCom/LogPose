{% extends "base.html" %}

{% block title %}Create board — LogPose{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-card">

    <div class="auth-header">
      <h1 class="auth-title">Create a board</h1>
      <p class="auth-sub">Personal boards are just for you. Shared boards belong to a team.</p>
    </div>

    <form method="POST" action="">

      <div class="form-group">
        <label for="input_board_name">Board name</label>
        <input type="text" id="input_board_name" name="input_board_name" placeholder="e.g. Monitoring Tools" required>
      </div>

      <div class="form-group">
        <label>Board type</label>
        <div class="radio-row">
          <label class="radio-option">
            <input type="radio" id="input_personal_board" name="board_type" value="personal" checked>
            <span>Personal</span>
          </label>
          <label class="radio-option">
            <input type="radio" id="input_shared_board" name="board_type" value="shared">
            <span>Shared (team)</span>
          </label>
        </div>
      </div>

      <div class="form-group" id="team-select-group" style="display: none;">
        <label for="selected_team">Create board for</label>
        <select name="selected_team" id="selected_team">
          {% for team in teams %}
            <option value="{{ team.id }}">{{ team.team_name }}</option>
          {% endfor %}
        </select>
      </div>

      <button type="submit" class="auth-btn">Create board</button>

    </form>
  </div>
</div>

{% block extra_js %}
<script>
    const personalRadio = document.getElementById('input_personal_board');
    const sharedRadio = document.getElementById('input_shared_board');
    const teamGroup = document.getElementById('team-select-group');

    function toggleTeamSelect() {
        teamGroup.style.display = sharedRadio.checked ? 'block' : 'none';
    }

    personalRadio.addEventListener('change', toggleTeamSelect);
    sharedRadio.addEventListener('change', toggleTeamSelect);
</script>
{% endblock %}

{% endblock %}
